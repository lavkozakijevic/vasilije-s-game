<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elemental Heroes — Level 1: The Jungle</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
<style>
  :root{ --bg:#0c150e; --panel:#13211a; --ink:#e8efe6; --muted:#8fa593; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;}
  #wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:12px;padding:16px;}
  h1{margin:0;font-size:17px;letter-spacing:.4px;font-weight:700;}
  h1 span{color:var(--muted);font-weight:400;font-size:12.5px;}
  #game{width:960px;max-width:97vw;aspect-ratio:16/9;border-radius:12px;overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.06);}
  #legend{display:flex;flex-wrap:wrap;gap:8px 14px;justify-content:center;
    font-size:12px;color:var(--muted);max-width:980px;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;
    background:var(--panel);border:1px solid rgba(255,255,255,.07);}
  .dot{width:9px;height:9px;border-radius:50%;}
  kbd{background:#21342899;border:1px solid rgba(255,255,255,.14);border-bottom-width:2px;
    border-radius:5px;padding:1px 6px;font-size:11px;color:var(--ink);font-family:inherit;}
</style>
</head>
<body>
<div id="wrap">
  <h1>Elemental Heroes <span>· Level 1 — The Jungle</span></h1>
  <div id="game"></div>
  <div id="legend">
    <span class="pill"><span class="dot" style="background:#ff5a3c"></span>Fire <kbd>1</kbd></span>
    <span class="pill"><span class="dot" style="background:#3aa0ff"></span>Water <kbd>2</kbd></span>
    <span class="pill"><span class="dot" style="background:#c08a4e"></span>Earth <kbd>3</kbd></span>
    <span class="pill"><span class="dot" style="background:#9a8c7a"></span>Stone <kbd>4</kbd></span>
    <span class="pill"><span class="dot" style="background:#7ad14a"></span>Poison <kbd>5</kbd></span>
    <span class="pill"><span class="dot" style="background:#e85aa0"></span>Rubber <kbd>6</kbd></span>
    <span>Move <kbd>← →</kbd> · Jump <kbd>Space</kbd> · Attack <kbd>E</kbd> · Ability <kbd>Q</kbd> · Climb <kbd>↑</kbd> · Menu <kbd>Tab</kbd> · Restart <kbd>R</kbd></span>
  </div>
</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
